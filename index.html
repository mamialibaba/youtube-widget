<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Tune</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #00ffcc;
    --neon2: #ff3366;
    --dark: #080b12;
    --dark2: #0d1117;
    --card: #111827;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 60px;
    position: relative;
    z-index: 1;
  }
  header { text-align: center; padding: 50px 0 36px; }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--neon);
    animation: pulse 3s ease-in-out infinite;
  }
  .logo span { color: var(--neon2); }
  .tagline {
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 10px;
  }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px rgba(0,255,204,0.5), 0 0 60px rgba(0,255,204,0.2); }
    50% { text-shadow: 0 0 50px rgba(0,255,204,0.8), 0 0 100px rgba(0,255,204,0.3); }
  }
  .section {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
    transition: border-color 0.3s;
  }
  .section:hover { border-color: rgba(0,255,204,0.2); }
  .section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .section:hover::before { opacity: 1; }
  .section-body { padding: 24px 28px 22px; }
  .game-section::before { opacity: 1; }
  .game-section { border-color: rgba(0,255,204,0.15); }
  #game-frame {
    width: 100%;
    height: 600px;
    border: none;
    display: block;
    background: #000;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .section-icon {
    width: 34px; height: 34px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-spotify { background: rgba(30,215,96,0.12); }
  .icon-youtube { background: rgba(255,51,51,0.12); }
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
  }
  .section-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1;
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 11px 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row input::placeholder { color: var(--muted); }
  .input-row input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 3px rgba(0,255,204,0.07);
  }
  .input-row input.yt:focus {
    border-color: var(--neon2);
    box-shadow: 0 0 0 3px rgba(255,51,102,0.07);
  }
  .btn {
    background: transparent;
    border: 1px solid var(--neon);
    color: var(--neon);
    padding: 11px 20px;
    border-radius: 3px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--neon); color: var(--dark); box-shadow: 0 0 20px rgba(0,255,204,0.25); }
  .btn-red { border-color: var(--neon2); color: var(--neon2); }
  .btn-red:hover { background: var(--neon2); color: #fff; box-shadow: 0 0 20px rgba(255,51,102,0.25); }
  #spotify-container { margin-top: 16px; border-radius: 4px; overflow: hidden; display: none; }
  #spotify-frame { width: 100%; border: none; border-radius: 4px; display: block; }
  footer {
    text-align: center;
    padding: 28px 0;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Orbitron', monospace;
    border-top: 1px solid rgba(255,255,255,0.04);
    margin-top: 4px;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 2px; }
  @media (max-width: 600px) {
    #game-frame { height: 340px; }
    .section-body { padding: 18px 16px; }
    .input-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">BLOCK<span>TUNE</span></div>
    <div class="tagline">Ritmi yakala &bull; Blokları patlat</div>
  </header>

  <!-- OYUN -->
  <div class="section game-section">
    <iframe
      id="game-frame"
      src=https://mamialibaba.github.io/blocktune-game
      allowfullscreen
      allow="autoplay; fullscreen">
    </iframe>
  </div>

  <!-- YOUTUBE -->
  <div class="section">
    <div class="section-body">
      <div class="section-header">
        <div class="section-icon icon-youtube">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#ff3333"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </div>
        <div>
          <div class="section-title">YouTube Arama</div>
          <div class="section-sub">Şarkı veya video ara, yeni sekmede açılır</div>
        </div>
      </div>
      <div class="input-row">
        <input type="text" class="yt" id="yt-query" placeholder="Şarkı, video veya kanal ara..." onkeydown="if(event.key==='Enter') araYT()" />
        <button class="btn btn-red" onclick="araYT()">Ara</button>
      </div>
    </div>
  </div>

  <!-- SPOTIFY -->
  <div class="section">
    <div class="section-body">
      <div class="section-header">
        <div class="section-icon icon-spotify">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1ed760"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        </div>
        <div>
          <div class="section-title">Spotify Playlist</div>
          <div class="section-sub">Playlist linkini yapıştır, sitede çalsın</div>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="spotify-url" placeholder="https://open.spotify.com/playlist/..." onkeydown="if(event.key==='Enter') loadSpotify()" />
        <button class="btn" onclick="loadSpotify()">Yükle</button>
      </div>
      <div id="spotify-container">
        <iframe id="spotify-frame" height="152" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </div>
  </div>

  <footer>Block Tune &bull; 2026</footer>
</div>

<script>
  function araYT() {
    var q = document.getElementById('yt-query').value.trim();
    if (!q) return;
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(q), '_blank');
  }
  function loadSpotify() {
    var url = document.getElementById('spotify-url').value.trim();
    if (!url) return;
    var match = url.match(/spotify\.com\/(playlist|album|track|artist)\/([a-zA-Z0-9]+)/);
    if (!match) { alert('Geçerli bir Spotify linki gir!'); return; }
    var embedUrl = 'https://open.spotify.com/embed/' + match[1] + '/' + match[2] + '?utm_source=generator&theme=0';
    var frame = document.getElementById('spotify-frame');
    var container = document.getElementById('spotify-container');
    frame.src = embedUrl;
    frame.height = match[1] === 'track' ? '152' : '352';
    container.style.display = 'block';
  }
</script>
</body>
</html>
