<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Arama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: transparent; padding: 20px; }

  .container {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .yt-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 26px;
    font-weight: 700;
    color: #ff0000;
    letter-spacing: -0.5px;
  }

  .search-row {
    display: flex;
    width: 100%;
    border: 1.5px solid #ccc;
    border-radius: 24px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .search-row:focus-within {
    border-color: #ff0000;
    box-shadow: 0 2px 12px rgba(255,0,0,0.15);
  }

  .search-row input {
    flex: 1;
    border: none;
    outline: none;
    padding: 12px 20px;
    font-size: 16px;
    color: #222;
    background: transparent;
  }

  .search-row input::placeholder { color: #aaa; }

  .search-row button {
    background: #ff0000;
    border: none;
    padding: 0 22px;
    cursor: pointer;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    border-radius: 0 22px 22px 0;
  }

  .search-row button:hover { background: #cc0000; }
  .search-row button:active { background: #aa0000; }

  .hint {
    font-size: 13px;
    color: #999;
  }
</style>
</head>
<body>
<div class="container">
  <div class="yt-logo">
    <svg width="34" height="24" viewBox="0 0 90 63" xmlns="http://www.w3.org/2000/svg">
      <rect width="90" height="63" rx="14" fill="#FF0000"/>
      <polygon points="36,18 36,45 62,31.5" fill="white"/>
    </svg>
    YouTube'da Ara
  </div>

  <div class="search-row">
    <input type="text" id="q" placeholder="Şarkı, video veya kanal ara..." onkeydown="if(event.key==='Enter') ara()" />
    <button onclick="ara()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
    </button>
  </div>

  <p class="hint">Enter'a bas veya butona tıkla — YouTube'da açılır.</p>
</div>

<script>
  function ara() {
    var q = document.getElementById('q').value.trim();
    if (!q) return;
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(q), '_blank');
  }
</script>
</body>
</html>
